{% extends "base.html" %}
{% block title %}Login - Chick-fil-A Assistant{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Log In</h2>
    <p class="auth-subtitle">Sign in to save your chat history</p>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}
      <label class="auth-label" for="username">Username</label>
      <input class="auth-input" type="text" name="username" id="username" required autofocus />

      <label class="auth-label" for="password">Password</label>
      <input class="auth-input" type="password" name="password" id="password" required />

      <button class="auth-btn" type="submit">Log In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
  </div>
</div>
{% endblock %}
